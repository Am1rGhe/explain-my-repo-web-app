<svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
>
  <defs>
    <!-- same dark gradient vibe as the app background -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <!-- accent gradient matching your red/orange/pink accent -->
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect
    x="1.5"
    y="1.5"
    width="21"
    height="21"
    rx="5"
    fill="url(#bg-grad)"
  />
  <rect
    x="1.5"
    y="1.5"
    width="21"
    height="21"
    rx="5"
    stroke="#020617"
    stroke-width="1.3"
  />

  <!-- Lucide brain paths, but stroked with our accent gradient -->
  <g
    transform="translate(1.5 1.5)"
    fill="none"
    stroke="url(#accent-grad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M10.5 15V2" />
    <path d="M13.5 10a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4" />
    <path d="M16.098 3.5A3 3 0 1 0 10.5 2a3 3 0 1 0-5.598 1.5" />
    <path d="M16.497 2.125A4 4 0 0 1 19.023 7.895" />
    <path d="M16.5 15a4 4 0 0 0 2-7.464" />
    <path d="M18.467 14.483A4 4 0 1 1 10.5 15a4 4 0 1 1-7.967-.517" />
    <path d="M4.5 15a4 4 0 0 1-2-7.464" />
    <path d="M4.503 2.125A4 4 0 0 0 1.977 7.895" />
  </g>
</svg>